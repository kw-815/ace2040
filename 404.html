<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Página no encontrada — Agenda de Crecimiento Ecuador 2040</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" />
  <style>
    :root { --indigo:#1E2470; --orange:#FF863E; }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100dvh;
      display:grid; place-items:center;
      background:var(--indigo);
      background-image:radial-gradient(60rem 40rem at 70% -10%, rgba(64,70,190,.4), transparent 60%);
      color:#fff; font-family:"DM Sans",system-ui,sans-serif;
      text-align:center; padding:2rem;
    }
    .box{max-width:480px}
    img{height:44px;width:auto;margin:0 auto 2.5rem}
    h1{font-size:clamp(2rem,6vw,3rem);margin:0 0 .75rem;letter-spacing:-.02em}
    p{color:rgba(255,255,255,.7);margin:0 0 2rem;line-height:1.6}
    a{
      display:inline-block;padding:.9rem 1.8rem;border-radius:10px;
      background:var(--orange);color:#232876;font-weight:700;text-decoration:none;
      transition:filter .2s ease;
    }
    a:hover{filter:brightness(1.08)}
    small{display:block;margin-top:1.5rem;color:rgba(255,255,255,.45);font-size:.85rem}
  </style>
</head>
<body>
  <div class="box">
    <img src="/img/logo-keyword-white.svg" alt="Keyword" onerror="this.style.display='none'" />
    <h1>Página no encontrada</h1>
    <p>El enlace que abriste no existe o cambió de dirección.</p>
    <a href="/">Ir al inicio</a>
    <small>Agenda de Crecimiento Ecuador 2040</small>
  </div>
</body>
</html>
